<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Password updated — WattleLink</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght,SOFT@9..144,300..900,0..100&family=Geist:wght@300..700&display=swap" rel="stylesheet">
<style>
:root{--ink:#121613;--muted:#6A706A;--line:#E3DFD0;--paper:#F6F2E7;--surface:#FFFFFF;--euc:#264032;--euc-d:#1A2E23;--euc-l:#3C5C4A;--wattle:#C89B2A;--coral:#B85C3A;--r:8px;--serif:"Fraunces","Iowan Old Style",Georgia,serif;--sans:"Geist",ui-sans-serif,system-ui,sans-serif}
*,*::before,*::after{box-sizing:border-box}
body{font-family:var(--sans);font-size:14px;line-height:1.5;color:var(--ink);background:var(--paper);min-height:100vh;display:flex;align-items:center;justify-content:center;background-image:radial-gradient(circle at 20% 10%,rgba(200,155,42,.05) 0%,transparent 40%),radial-gradient(circle at 80% 90%,rgba(38,64,50,.05) 0%,transparent 40%)}
.card{background:var(--surface);border:1px solid var(--line);border-radius:14px;padding:40px;width:100%;max-width:380px;box-shadow:0 8px 40px -16px rgba(0,0,0,.1);text-align:center}
.brand{display:flex;align-items:center;justify-content:center;gap:10px;margin-bottom:32px}
.brand-m{width:32px;height:32px;display:grid;place-items:center;background:var(--euc);border-radius:8px}
.brand-n{font-family:var(--serif);font-weight:400;font-size:22px;letter-spacing:-.02em;color:var(--ink)}.brand-n em{font-style:italic;font-weight:300;color:var(--euc)}
.icon-wrap{width:56px;height:56px;background:#E8EFE9;border:1px solid #CFDAD0;border-radius:50%;display:flex;align-items:center;justify-content:center;margin:0 auto 20px}
h1{font-family:var(--serif);font-weight:300;font-size:24px;letter-spacing:-.02em;color:var(--ink);margin:0 0 10px}
.body-text{color:var(--muted);font-size:13px;line-height:1.6;margin-bottom:28px}
.btn-submit{display:inline-block;padding:9px 24px;background:var(--euc);color:#F4F6F2;border:none;border-radius:var(--r);font:inherit;font-size:13.5px;font-weight:500;cursor:pointer;text-decoration:none;transition:background .12s}
.btn-submit:hover{background:var(--euc-d)}
</style>
</head>
<body>
<div class="card">
  <div class="brand">
    <div class="brand-m">
      <svg width="18" height="18" viewBox="0 0 220 48" fill="none" xmlns="http://www.w3.org/2000/svg">
        <path d="M5 8 C7 14 8 20 10 23 C10.5 24 11 24 11.5 23 C12 21 13 19 16 19 C19 19 20 21 20.5 23 C21 24 21.5 24 22 23 C24 20 25 14 27 8 L24 8 C23.5 10 23 14 22 16 C21.5 17 21 17 20.5 16 C20 14 19 11 16 11 C13 11 12 14 11.5 16 C11 17 10.5 17 10 16 C9 14 8.5 10 8 8 Z" fill="#F4F6F2"/>
      </svg>
    </div>
    <div class="brand-n">Wattle<em>Link</em></div>
  </div>

  <div class="icon-wrap">
    <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="var(--euc)" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
      <path d="M20 6L9 17l-5-5"/>
    </svg>
  </div>

  <h1>Password updated</h1>
  <p class="body-text">Your password has been changed successfully. You can now sign in with your new password.</p>

  <a href="{% url 'account_login' %}" class="btn-submit">Sign in</a>
</div>
</body>
</html>
