<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Start your free trial — WattleLink</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght,SOFT@9..144,300..900,0..100&family=Geist:wght@300..700&family=Geist+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
:root{--ink:#121613;--muted:#6A706A;--line:#E3DFD0;--paper:#F6F2E7;--surface:#FFFFFF;--euc:#264032;--euc-d:#1A2E23;--euc-l:#3C5C4A;--wattle:#C89B2A;--wattle-l:#E5BE5A;--coral:#B85C3A;--r:8px;--serif:"Fraunces","Iowan Old Style",Georgia,serif;--sans:"Geist",ui-sans-serif,system-ui,-apple-system,sans-serif;--mono:"Geist Mono",ui-monospace,SFMono-Regular,Menlo,monospace}
*,*::before,*::after{box-sizing:border-box}
html,body{margin:0;padding:0;height:100%;font-family:var(--sans);font-size:14px;line-height:1.5;color:var(--ink);-webkit-font-smoothing:antialiased}
h1,h2,h3{margin:0;font-weight:500}
p{margin:0}
a{color:inherit;text-decoration:none}
button{font:inherit;cursor:pointer}

.layout{display:grid;grid-template-columns:400px 1fr;min-height:100vh}

/* Left panel */
.left{background:var(--euc);color:#E8EFE9;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:48px 40px;gap:32px}
.left-logo{width:180px}
.left-tagline{font-family:var(--serif);font-size:22px;font-weight:300;line-height:1.35;color:rgba(232,239,233,.9);text-align:center;letter-spacing:-.01em}
.left-tagline em{font-style:italic;color:var(--wattle-l)}
.trial-badge{display:inline-flex;align-items:center;gap:8px;background:rgba(200,155,42,.15);border:1px solid rgba(200,155,42,.3);color:var(--wattle-l);font-family:var(--mono);font-size:11px;padding:6px 14px;border-radius:20px;letter-spacing:.04em}
.trial-badge svg{width:13px;height:13px;flex-shrink:0}

/* Right panel */
.right{background:var(--paper);display:flex;align-items:center;justify-content:center;padding:40px}
.form-card{background:var(--surface);border:1px solid var(--line);border-radius:16px;padding:40px;width:100%;max-width:440px;box-shadow:0 2px 24px rgba(0,0,0,.06)}
.form-heading{font-family:var(--serif);font-size:26px;font-weight:400;color:var(--euc);margin-bottom:6px;letter-spacing:-.02em}
.form-sub{color:var(--muted);font-size:13px;margin-bottom:28px}

.field-row{display:grid;grid-template-columns:1fr 1fr;gap:12px}
.field{margin-bottom:16px}
.field label{display:block;font-size:12px;font-weight:500;color:var(--ink);margin-bottom:5px;letter-spacing:.02em}
.field input{width:100%;background:var(--paper);border:1px solid var(--line);border-radius:var(--r);padding:9px 11px;font:inherit;font-size:13.5px;color:var(--ink);transition:border-color .15s,background .15s;outline:none}
.field input:focus{border-color:var(--euc-l);background:var(--surface)}
.field input::placeholder{color:#B0B8B0}

.error-box{background:#FEF2F0;border:1px solid #F0C4BC;border-radius:var(--r);padding:10px 14px;color:var(--coral);font-size:13px;margin-bottom:18px;display:flex;align-items:flex-start;gap:8px}
.error-box svg{width:15px;height:15px;flex-shrink:0;margin-top:1px}

.submit-btn{width:100%;background:var(--euc);color:#F4F6F2;border:none;border-radius:var(--r);padding:11px;font:inherit;font-size:14px;font-weight:500;cursor:pointer;transition:background .15s;margin-top:4px}
.submit-btn:hover{background:var(--euc-d)}

.form-footer{margin-top:20px;text-align:center;font-size:13px;color:var(--muted)}
.form-footer a{color:var(--euc-l);font-weight:500}
.form-footer a:hover{text-decoration:underline}

@media(max-width:720px){.layout{grid-template-columns:1fr}.left{padding:32px 24px;min-height:auto}.right{padding:24px}.form-card{padding:28px}}
</style>
</head>
<body>
<div class="layout">

  <!-- Left panel -->
  <div class="left">
    <svg class="left-logo" viewBox="36 -8 126 138" fill="none">
      <path d="M55 80 C63 54 81 28 103 16 C115 10 127 14 135 24" stroke="rgba(255,255,255,0.45)" stroke-width="2.4" stroke-linecap="round"/>
      <path d="M83 38 C75 28 67 26 61 32" stroke="rgba(255,255,255,0.3)" stroke-width="1.5" stroke-linecap="round"/>
      <path d="M103 16 C107 8 115 2 123 6" stroke="rgba(255,255,255,0.3)" stroke-width="1.2" stroke-linecap="round"/>
      <circle cx="135" cy="24" r="14" fill="#A07820"/><circle cx="135" cy="24" r="9.5" fill="#E5BE5A"/>
      <circle cx="61" cy="32" r="11" fill="#A07820"/><circle cx="61" cy="32" r="7.5" fill="#E5BE5A"/>
      <circle cx="123" cy="6" r="8.5" fill="#A07820"/><circle cx="123" cy="6" r="5.5" fill="#E5BE5A"/>
      <circle cx="83" cy="38" r="6.5" fill="#A07820"/><circle cx="83" cy="38" r="4.2" fill="#E5BE5A"/>
      <circle cx="103" cy="16" r="5.5" fill="#A07820"/><circle cx="103" cy="16" r="3.5" fill="#E5BE5A"/>
      <circle cx="67" cy="56" r="4.5" fill="#A07820"/><circle cx="67" cy="56" r="2.8" fill="#E5BE5A"/>
      <path d="M91 28 C85 23 79 25 74 22" stroke="rgba(255,255,255,0.2)" stroke-width="0.9" stroke-linecap="round"/>
      <path d="M91 28 C87 33 81 31 76 34" stroke="rgba(255,255,255,0.2)" stroke-width="0.9" stroke-linecap="round"/>
      <path d="M115 18 C119 13 125 15 131 12" stroke="rgba(255,255,255,0.15)" stroke-width="0.8" stroke-linecap="round"/>
      <text x="99" y="118" text-anchor="middle" fill="#F4F6F2" font-size="32" font-family="Georgia, serif" font-weight="400" letter-spacing="-0.02em">Wattle<tspan font-style="italic" font-weight="300">Link</tspan></text>
    </svg>

    <p class="left-tagline">Literature to <em>claims</em>.<br>The pipeline for medical affairs.</p>

    <div class="trial-badge">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 2L2 7l10 5 10-5-10-5zM2 17l10 5 10-5M2 12l10 5 10-5"/></svg>
      14-day free trial &nbsp;·&nbsp; No credit card required
    </div>
  </div>

  <!-- Right panel -->
  <div class="right">
    <div class="form-card">
      <h1 class="form-heading">Start your free trial</h1>
      <p class="form-sub">Create your team workspace in seconds.</p>

      {% if error %}
      <div class="error-box">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="12"/><line x1="12" y1="16" x2="12.01" y2="16"/></svg>
        {{ error }}
      </div>
      {% endif %}

      <form method="post" action="">
        {% csrf_token %}

        <div class="field">
          <label for="company_name">Company / organisation name</label>
          <input type="text" id="company_name" name="company_name"
                 value="{{ post.company_name|default:'' }}"
                 placeholder="Acme Medical Affairs" autocomplete="organization" required>
        </div>

        <div class="field-row">
          <div class="field" style="margin-bottom:0">
            <label for="first_name">First name</label>
            <input type="text" id="first_name" name="first_name"
                   value="{{ post.first_name|default:'' }}"
                   placeholder="Jane" autocomplete="given-name">
          </div>
          <div class="field" style="margin-bottom:0">
            <label for="last_name">Last name</label>
            <input type="text" id="last_name" name="last_name"
                   value="{{ post.last_name|default:'' }}"
                   placeholder="Smith" autocomplete="family-name">
          </div>
        </div>
        <div style="height:16px"></div>

        <div class="field">
          <label for="email">Work email</label>
          <input type="email" id="email" name="email"
                 value="{{ post.email|default:'' }}"
                 placeholder="jane@acme.com" autocomplete="email" required>
        </div>

        <div class="field">
          <label for="password1">Password</label>
          <input type="password" id="password1" name="password1"
                 placeholder="Min. 8 characters" autocomplete="new-password" required>
        </div>

        <div class="field">
          <label for="password2">Confirm password</label>
          <input type="password" id="password2" name="password2"
                 placeholder="Repeat password" autocomplete="new-password" required>
        </div>

        <button type="submit" class="submit-btn">Create account</button>
      </form>

      <p class="form-footer">
        Already have an account? <a href="/accounts/login/">Sign in</a>
      </p>
    </div>
  </div>

</div>
</body>
</html>
