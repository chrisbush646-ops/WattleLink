<td colspan="6" style="padding:0;background:var(--paper-warm);border-bottom:2px solid var(--euc-l)">
  <form method="POST"
        action="{% url 'accounts_app:admin_edit_user' u.pk %}"
        hx-post="{% url 'accounts_app:admin_edit_user' u.pk %}"
        hx-target="#edit-panel-{{ u.pk }}"
        hx-swap="innerHTML"
        style="padding:20px 24px">
    {% csrf_token %}

    <!-- Name + Role + Buttons -->
    <div style="display:grid;grid-template-columns:1fr 1fr 1fr auto;gap:12px;align-items:flex-end;margin-bottom:20px">
      <div>
        <label style="display:block;font-size:10px;font-weight:600;letter-spacing:.1em;text-transform:uppercase;color:var(--muted);margin-bottom:4px">First name</label>
        <input type="text" name="first_name" value="{{ u.first_name }}"
               style="width:100%;padding:7px 10px;border:1px solid var(--line);border-radius:var(--r);font:inherit;font-size:13px;color:var(--ink);background:var(--surface)">
      </div>
      <div>
        <label style="display:block;font-size:10px;font-weight:600;letter-spacing:.1em;text-transform:uppercase;color:var(--muted);margin-bottom:4px">Last name</label>
        <input type="text" name="last_name" value="{{ u.last_name }}"
               style="width:100%;padding:7px 10px;border:1px solid var(--line);border-radius:var(--r);font:inherit;font-size:13px;color:var(--ink);background:var(--surface)">
      </div>
      <div>
        <label style="display:block;font-size:10px;font-weight:600;letter-spacing:.1em;text-transform:uppercase;color:var(--muted);margin-bottom:4px">Global role</label>
        <select name="role"
                style="width:100%;padding:7px 10px;border:1px solid var(--line);border-radius:var(--r);font:inherit;font-size:13px;color:var(--ink);background:var(--surface)">
          {% for value, label in role_choices %}
          <option value="{{ value }}"{% if value == u.role %} selected{% endif %}>{{ label }}</option>
          {% endfor %}
        </select>
      </div>
      <div style="display:flex;gap:6px;padding-bottom:1px">
        <button type="submit" class="btn btn-p btn-sm">Save</button>
        <button type="button" class="btn btn-g btn-sm"
                onclick="(function(){var tr=document.getElementById('edit-panel-{{ u.pk }}');tr.innerHTML='<td colspan=6 style=padding:0></td>'})()">
          Cancel
        </button>
      </div>
    </div>

    <!-- Per-module permission grid -->
    <div>
      <div style="font-size:10px;font-weight:600;letter-spacing:.1em;text-transform:uppercase;color:var(--muted);margin-bottom:10px">
        Per-module access
        <span style="font-weight:400;text-transform:none;letter-spacing:0;margin-left:4px">— overrides the global role for specific sections</span>
      </div>
      <div style="display:grid;grid-template-columns:repeat(2,1fr);gap:5px 18px">
        {% for key, label, cur in module_perms %}
        <div style="display:flex;align-items:center;justify-content:space-between;padding:6px 10px;background:var(--surface);border:1px solid var(--line);border-radius:7px">
          <span style="font-size:12.5px;color:var(--ink);font-weight:500">{{ label }}</span>
          <div style="display:flex;border:1px solid var(--line);border-radius:6px;overflow:hidden;flex-shrink:0" data-perm-group>

            <label style="display:flex;align-items:center;padding:3px 8px;font-size:11px;font-weight:500;cursor:pointer;color:{% if cur == '' %}#F4F6F2{% else %}var(--muted){% endif %};background:{% if cur == '' %}var(--euc){% else %}transparent{% endif %};transition:all .1s" title="Inherit global role">
              <input type="radio" name="mod_{{ key }}" value="" {% if cur == "" %}checked{% endif %} style="display:none">
              Global
            </label>

            <label style="display:flex;align-items:center;padding:3px 8px;font-size:11px;font-weight:500;cursor:pointer;color:{% if cur == 'editor' %}#F4F6F2{% else %}var(--muted){% endif %};background:{% if cur == 'editor' %}var(--euc-d){% else %}transparent{% endif %};border-left:1px solid var(--line);transition:all .1s" title="Can create and edit">
              <input type="radio" name="mod_{{ key }}" value="editor" {% if cur == "editor" %}checked{% endif %} style="display:none">
              Editor
            </label>

            <label style="display:flex;align-items:center;padding:3px 8px;font-size:11px;font-weight:500;cursor:pointer;color:{% if cur == 'viewer' %}#F4F6F2{% else %}var(--muted){% endif %};background:{% if cur == 'viewer' %}var(--sky){% else %}transparent{% endif %};border-left:1px solid var(--line);transition:all .1s" title="Read only">
              <input type="radio" name="mod_{{ key }}" value="viewer" {% if cur == "viewer" %}checked{% endif %} style="display:none">
              Viewer
            </label>

            <label style="display:flex;align-items:center;padding:3px 8px;font-size:11px;font-weight:500;cursor:pointer;color:{% if cur == 'none' %}#F4F6F2{% else %}var(--muted){% endif %};background:{% if cur == 'none' %}var(--coral){% else %}transparent{% endif %};border-left:1px solid var(--line);transition:all .1s" title="No access">
              <input type="radio" name="mod_{{ key }}" value="none" {% if cur == "none" %}checked{% endif %} style="display:none">
              None
            </label>

          </div>
        </div>
        {% endfor %}
      </div>
    </div>

  </form>
</td>

<script>
(function() {
  var colors = {
    '': {bg: 'var(--euc)', color: '#F4F6F2'},
    'editor': {bg: 'var(--euc-d)', color: '#F4F6F2'},
    'viewer': {bg: 'var(--sky)', color: '#F4F6F2'},
    'none': {bg: 'var(--coral)', color: '#F4F6F2'}
  };
  document.querySelectorAll('[data-perm-group]').forEach(function(group) {
    group.querySelectorAll('input[type=radio]').forEach(function(radio) {
      radio.addEventListener('change', function() {
        group.querySelectorAll('label').forEach(function(lbl) {
          lbl.style.background = 'transparent';
          lbl.style.color = 'var(--muted)';
        });
        var c = colors[radio.value] || colors[''];
        radio.closest('label').style.background = c.bg;
        radio.closest('label').style.color = c.color;
      });
    });
  });
})();
</script>
