{% with vs=candidate.verification_status vc=candidate.verification_color %}
<div id="verify-badge-{{ candidate.pk }}"
  {% if vs == 'UNVERIFIED' %}
  hx-get="{% url 'kol:candidate_verify_status' candidate.pk %}"
  hx-trigger="load delay:3s, every 8s"
  hx-swap="outerHTML"
  {% endif %}
  style="display:inline-flex;align-items:center;gap:5px">

  {% if vs == 'UNVERIFIED' %}
    <svg style="width:12px;height:12px;color:var(--muted);animation:spin 1.2s linear infinite" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
      <path d="M21 12a9 9 0 1 1-6.219-8.56"/>
    </svg>
    <span style="font-size:10px;color:var(--muted)">Checking…</span>

  {% elif vs == 'LIKELY_CURRENT' %}
    <svg style="width:12px;height:12px;color:var(--euc)" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5">
      <path d="M20 6L9 17l-5-5"/>
    </svg>
    <span style="font-size:10px;color:var(--euc);font-weight:500">Likely Current</span>

  {% elif vs == 'UNCERTAIN' %}
    <svg style="width:12px;height:12px;color:#8A6918" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
      <circle cx="12" cy="12" r="10"/><path d="M12 8v4m0 4h.01"/>
    </svg>
    <span style="font-size:10px;color:#8A6918;font-weight:500">Uncertain</span>

  {% elif vs == 'POSSIBLY_INACTIVE' %}
    <svg style="width:12px;height:12px;color:var(--coral)" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
      <path d="M10.29 3.86L1.82 18a2 2 0 0 0 1.71 3h16.94a2 2 0 0 0 1.71-3L13.71 3.86a2 2 0 0 0-3.42 0z"/><line x1="12" y1="9" x2="12" y2="13"/><line x1="12" y1="17" x2="12.01" y2="17"/>
    </svg>
    <span style="font-size:10px;color:var(--coral);font-weight:500">Possibly Inactive</span>
  {% endif %}
</div>
{% endwith %}

<style>
@keyframes spin { to { transform: rotate(360deg); } }
</style>
