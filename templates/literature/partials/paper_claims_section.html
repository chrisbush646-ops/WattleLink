<div id="paper-detail-claims-{{ paper.pk }}">
  {% if error %}
  <div style="padding:10px 14px;background:#FDF0EC;border-left:2px solid var(--coral);border-radius:0 6px 6px 0;font-size:12px;color:var(--coral);margin-bottom:8px">
    {{ error }}
  </div>
  {% endif %}

  {% if claims %}
    {% for claim in claims %}
      {% include "claims/partials/linked_claim_row.html" with claim=claim %}
    {% endfor %}
  {% else %}
    <div style="padding:16px;text-align:center;color:var(--muted);font-size:12px">
      No claims yet. Click <strong>Suggest</strong> to generate AI-drafted claims from this paper.
    </div>
  {% endif %}
</div>
