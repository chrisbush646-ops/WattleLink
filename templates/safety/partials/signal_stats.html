<div style="flex:1;padding:14px 16px;background:var(--surface);border:1px solid var(--line);border-radius:var(--r)">
  <div style="font-size:10px;letter-spacing:.1em;text-transform:uppercase;color:var(--muted);font-weight:500;margin-bottom:4px">Total signals</div>
  <div style="font-size:22px;font-weight:700;color:var(--ink);font-family:var(--serif)">{{ total }}</div>
</div>
<div style="flex:1;padding:14px 16px;background:var(--coral-soft);border:1px solid #E9CBB9;border-radius:var(--r)">
  <div style="font-size:10px;letter-spacing:.1em;text-transform:uppercase;color:var(--coral);font-weight:500;margin-bottom:4px">Active</div>
  <div style="font-size:22px;font-weight:700;color:var(--coral);font-family:var(--serif)">{{ active_count|default:"—" }}</div>
</div>
<div style="flex:1;padding:14px 16px;background:var(--wattle-soft);border:1px solid #E7D59A;border-radius:var(--r)">
  <div style="font-size:10px;letter-spacing:.1em;text-transform:uppercase;color:#8A6918;font-weight:500;margin-bottom:4px">Monitoring</div>
  <div style="font-size:22px;font-weight:700;color:#8A6918;font-family:var(--serif)">{{ monitoring_count|default:"—" }}</div>
</div>
<div style="flex:1;padding:14px 16px;background:var(--surface);border:1px solid var(--line);border-radius:var(--r)">
  <div style="font-size:10px;letter-spacing:.1em;text-transform:uppercase;color:var(--muted);font-weight:500;margin-bottom:4px">Papers scanned</div>
  <div style="font-size:22px;font-weight:700;color:var(--ink);font-family:var(--serif)">{{ scanned_count }}</div>
  {% if unscanned_count > 0 %}
  <div style="font-size:10px;color:var(--muted);margin-top:2px">{{ unscanned_count }} unscanned</div>
  {% endif %}
</div>
