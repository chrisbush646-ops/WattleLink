<div style="background:var(--surface);border-radius:10px;border:1px solid var(--line);padding:16px 20px">
  <div style="font-size:10px;letter-spacing:.14em;text-transform:uppercase;color:var(--muted);margin-bottom:6px">Accepted</div>
  <div style="font-size:26px;font-family:var(--mono);font-weight:600;color:var(--euc)">{{ approved_count }}</div>
</div>
<div style="background:var(--surface);border-radius:10px;border:1px solid var(--line);padding:16px 20px">
  <div style="font-size:10px;letter-spacing:.14em;text-transform:uppercase;color:var(--muted);margin-bottom:6px">Awaiting Approval</div>
  <div style="font-size:26px;font-family:var(--mono);font-weight:600;color:#8A6918">{{ pending_count }}</div>
</div>
<div style="background:var(--surface);border-radius:10px;border:1px solid var(--line);padding:16px 20px">
  <div style="font-size:10px;letter-spacing:.14em;text-transform:uppercase;color:var(--muted);margin-bottom:6px">Total Claims</div>
  <div style="font-size:26px;font-family:var(--mono);font-weight:600;color:var(--ink)">{{ total_count }}</div>
</div>
