# HTTP — redirect all traffic to HTTPS and serve Let's Encrypt challenge
server {
    listen 80;
    server_name wattlelink.com.au www.wattlelink.com.au;

    # Let's Encrypt ACME challenge (certbot webroot)
    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    location / {
        return 301 https://www.wattlelink.com.au$request_uri;
    }
}

# Redirect bare domain to www
server {
    listen 443 ssl;
    server_name wattlelink.com.au;

    ssl_certificate     /etc/letsencrypt/live/wattlelink.com.au/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/wattlelink.com.au/privkey.pem;

    return 301 https://www.wattlelink.com.au$request_uri;
}

# Main HTTPS server
server {
    listen 443 ssl;
    server_name www.wattlelink.com.au;

    ssl_certificate     /etc/letsencrypt/live/wattlelink.com.au/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/wattlelink.com.au/privkey.pem;

    # Modern SSL config (Mozilla Intermediate)
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384:ECDHE-ECDSA-CHACHA20-POLY1305:ECDHE-RSA-CHACHA20-POLY1305:DHE-RSA-AES128-GCM-SHA256;
    ssl_prefer_server_ciphers off;
    ssl_session_cache shared:SSL:10m;
    ssl_session_timeout 1d;

    # Security headers
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains; preload" always;
    add_header X-Frame-Options DENY always;
    add_header X-Content-Type-Options nosniff always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Permissions-Policy "geolocation=(), microphone=(), camera=()" always;

    # Static files — served directly by Nginx (fast, no Django involved)
    location /static/ {
        alias /var/www/staticfiles/;
        expires 30d;
        add_header Cache-Control "public, immutable";
        access_log off;
    }

    # Media files (uploaded PDFs, etc.)
    location /media/ {
        alias /var/www/media/;
        expires 7d;
        add_header Cache-Control "private";
    }

    # Django application
    location / {
        proxy_pass http://web:8000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_redirect off;
        proxy_read_timeout 300s;
        proxy_connect_timeout 75s;
        proxy_send_timeout 300s;
    }
}
